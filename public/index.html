<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1120" />
    <title>USFL Trip Tracker</title>

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; background: #0b1120; font-family: 'Inter', 'Segoe UI', sans-serif; }
      input:focus, select:focus, textarea:focus { outline: 2px solid #f97316; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Leaflet JS — must load BEFORE React bundle -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </body>
</html>
